<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About | Xiaowen Ma</title>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="MaMXW.css">

  <style>
    body {
      background: #0a0a0a;
      font-family: 'Urbanist', sans-serif;
      color: white;
      margin: 0;
      overflow-x: hidden;
    }

    /* 全站统一动态光晕背景 */
    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(230, 32, 112, 0.15) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    /* 关于页面的毛玻璃卡片 */
    .about-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #e62070; /* 保留你的标志性粉色线条 */
      text-align: left;
    }

    .section-title {
      font-size: 3rem;
      background: linear-gradient(to right, #fff, #e62070);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      font-weight: 700;
      text-align: center;
    }

    .highlight-text {
      color: #e62070;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 1.2rem;
      margin-top: 30px;
      display: block;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 25px;
      font-weight: 300;
    }

    strong {
      color: #fff;
    }

    /* 返回按钮样式 */
    .back-home {
      color: #e62070;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 2px;
      display: inline-block;
      margin-bottom: 30px;
      transition: 0.3s;
    }
    .back-home:hover {
      text-shadow: 0 0 10px rgba(230, 32, 112, 0.5);
      transform: translateX(-5px);
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <header>
