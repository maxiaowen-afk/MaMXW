<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Xiaowen Ma</title>
  <link rel="stylesheet" href="MaMXW.css">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      background: #0a0a0a;
      font-family: 'Urbanist', sans-serif;
      color: white;
      margin: 0;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(230, 32, 112, 0.15) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    .project-btn {
      padding: 15px 25px;
      cursor: pointer;
      background: transparent;
      color: white;
      border: 2px solid #e62070;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.4s ease;
      flex: 1;
      max-width: 250px;
      min-width: 200px;
      text-transform: uppercase;
    }

    .project-btn:hover {
      background: #e62070;
      box-shadow: 0 0 25px rgba(230, 32, 112, 0.6);
      transform: translateY(-3px) scale(1.05);
    }

    .content-box {
      display: none;
      margin-top: 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* 过程文字样式 */
    .process-section {
      text-align: left;
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid rgba(230, 32, 112, 0.3);
    }

    .process-title {
      color: #e62070;
      font-size: 1.4rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .process-item h4 {
      margin-bottom: 10px;
      color: #fff;
      font-size: 1.1rem;
    }

    .process-item p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #bbb;
      font-weight: 300;
    }

    .section-title {
      font-size: 3rem;
      background: linear-gradient(to right, #fff, #e62070);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      font-weight: 700;
    }

    .close-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 5px;
      transition: 0.3s;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <nav>
      <div class="logo" style="font-weight: 700; letter-spacing: 1px;">
        MA <span style="color: #e62070;">XW</span> ART.
      </div>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main style="max-width: 1100px; margin: 60px auto; padding: 0 20px; text-align: center;">

    <div style="margin-bottom: 30px; opacity: 0.5;">
        <a href="index.html" style="color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px;">&larr; BACK TO HOME</a>
    </div>

    <h1 class="section-title">SELECTED WORKS</h1>

    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap;">
        <button onclick="showContent('pdf')" class="project-btn">PROJECT 01: PORTFOLIO</button>
        <button onclick="showContent('model_gallery')" class="project-btn">PROJECT 02: GALLERY</button>
        <button onclick="showContent('model_minions')" class="project-btn">PROJECT 03: MINIONS</button>
    </div>

    <div id="display-container">

        <div id="content-pdf" class="content-box">
            <div style="border-radius: 15px; overflow: hidden; background: white;">
                <iframe src="assets/%E4%BD%9C%E5%93%81%E9%9B%86.pdf" width="100%" height="800px" style="border: none;"></iframe>
            </div>

            <div class="process-section">
                <div class="process-title">THE CURATION PROCESS</div>
                <div class="process-grid">
                    <div class="process-item">
                        <h4>01. Strategy</h4>
                        <p>为了展示室内建筑的多样性，我精心筛选了过去几年中最具代表性的项目。重点在于展示从宏观空间布局到微观材质细节的掌控力。</p>
                    </div>
                    <div class="process-item">
                        <h4>02. Visual Logic</h4>
                        <p>使用 InDesign 进行排版，采用极简的黑白灰基调，确保图纸本身成为视觉焦点。每一页的叙事逻辑都遵循“从概念草图到最终实景”的顺序。</p>
                    </div>
