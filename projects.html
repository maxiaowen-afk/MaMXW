<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Xiaowen Ma</title>
  <link rel="stylesheet" href="MaMXW.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    .project-btn {
      padding: 15px 25px;
      cursor: pointer;
      background: #e62070;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(230, 32, 112, 0.3);
      transition: all 0.3s ease;
      flex: 1;
      max-width: 250px;
      min-width: 180px;
    }
    .project-btn:hover {
      background: #ff3385;
      transform: translateY(-2px);
    }
    .content-box {
      display: none;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo" style="text-decoration: none;">Xiaowen Ma art.</a>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main style="max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center;">
    <div style="margin-bottom: 30px;">
        <a href="index.html" style="color: #e62070; text-decoration: none; font-weight: bold;">&larr; BACK TO HOME</a>
    </div>

    <h2 style="color: white; margin-bottom: 40px; letter-spacing: 2px;">SELECT A WORK TO VIEW</h2>

    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap;">
        <button onclick="showContent('pdf')" class="project-btn">PROJECT 1: PORTFOLIO PDF</button>
        <button onclick="showContent('model_gallery')" class="project-btn">PROJECT 2: GALLERY 3D</button>
        <button onclick="showContent('model_minions')" class="project-btn">PROJECT 3: MINIONS 3D</button>
    </div>

    <div id="display-container">
        <div id="content-pdf" class="content-box">
            <div style="border-radius: 15px; border: 1px solid #444; overflow: hidden; background: white;">
                <iframe src="assets/protfolio.pdf" width="100%" height="800px" style="border: none;"></iframe>
            </div>
            <button onclick="hideAll()" style="margin-top: 20px; background: none; border: 1px solid #666; color: #999; cursor: pointer; padding: 5px 15px; border-radius: 5px;">Close View</button>
        </div>

        <div id="content-model_gallery" class="content-box">
            <div style="background: #262626; border-radius: 15px; border: 1px solid #444; overflow: hidden;">
                <model-viewer src="assets/gallery.glb" alt="Gallery 3D Model" auto-rotate camera-controls style="width: 100%; height: 600px;"></model-viewer>
            </div>
            <button onclick="hideAll()" style="margin-top: 20px; background: none; border: 1px solid #666; color: #999; cursor: pointer; padding: 5px 15px; border-radius: 5px;">Close View</button>
        </div>

        <div id="content-model_minions" class="content-box">
            <div style="background: #262626; border-radius: 15px; border: 1px solid #444; overflow: hidden;">
                <model-viewer src="assets/Minions%203d.glb" alt="Minions 3D Model" auto-rotate camera-controls style="width: 100%; height: 600px;"></model-viewer>
            </div>
            <button onclick="hideAll()" style="margin-top: 20px; background: none; border: 1px solid #666; color: #999; cursor: pointer; padding: 5px 15px; border-radius: 5px;">Close View</button>
        </div>
    </div>
  </main>

  <script>
    function showContent(type) {
        hideAll();
        const target = document.getElementById('content-' + type);
        if (target) {
            target.style.display = 'block';
            target.scrollIntoView({behavior: 'smooth', block: 'start'});
        }
    }

    function hideAll() {
        document.querySelectorAll('.content-box').forEach(el => el.style.display = 'none');
    }
  </script>
</body>
</html>
