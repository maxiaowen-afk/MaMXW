<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Xiaowen Ma</title>
  <link rel="stylesheet" href="MaMXW.css">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      background: #0a0a0a;
      font-family: 'Urbanist', sans-serif;
      color: white;
      margin: 0;
      overflow-x: hidden;
    }

    /* 首页同款动态光晕 */
    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(230, 32, 112, 0.15) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    /* 霓虹描边按钮 */
    .project-btn {
      padding: 15px 25px;
      cursor: pointer;
      background: transparent;
      color: white;
      border: 2px solid #e62070;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.4s ease;
      flex: 1;
      max-width: 250px;
      min-width: 200px;
      text-transform: uppercase;
    }

    .project-btn:hover {
      background: #e62070;
      box-shadow: 0 0 25px rgba(230, 32, 112, 0.6);
      transform: translateY(-3px) scale(1.05);
    }

    /* 展示容器：毛玻璃效果 */
    .content-box {
      display: none;
      margin-top: 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .section-title {
      font-size: 3rem;
      background: linear-gradient(to right, #fff, #e62070);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .close-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 5px;
      transition: 0.3s;
    }
    .close-btn:hover {
      color: white;
      border-color: #e62070;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <nav>
      <div class="logo" style="font-weight: 700; letter-spacing: 1px;">
        MA <span style="color: #e62070;">XW</span> ART.
      </div>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main style="max-width: 1100px; margin: 60px auto; padding: 0 20px; text-align: center;">

    <div style="margin-bottom: 30px; opacity: 0.5;">
        <a href="index.html" style="color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px;">&larr; BACK TO HOME</a>
    </div>

    <h1 class="section-title">SELECTED WORKS</h1>

    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap;">
        <button onclick="showContent('pdf')" class="project-btn">PROJECT 01: PORTFOLIO PDF</button>
        <button onclick="showContent('model_gallery')" class="project-btn">PROJECT 02: GALLERY 3D</button>
        <button onclick="showContent('model_minions')" class="project-btn">PROJECT 03: MINIONS 3D</button>
    </div>

    <div id="display-container">
        <div id="content-pdf" class="content-box">
            <div style="border-radius: 15px; overflow: hidden; background: white;">
                <iframe src="assets/%E4%BD%9C%E5%93%81%E9%9B%86.pdf" width="100%" height="800px" style="border: none;"></iframe>
            </div>
            <button onclick="hideAll()" class="close-btn">COLLAPSE VIEW</button>
        </div>

        <div id="content-model_gallery" class="content-box">
            <model-viewer src="assets/gallery.glb" alt="Gallery Model" auto-rotate camera-controls style="width: 100%; height: 600px;"></model-viewer>
            <button onclick="hideAll()" class="close-btn">COLLAPSE VIEW</button>
        </div>

        <div id="content-model_minions" class="content-box">
            <model-viewer src="assets/Minions%203d.glb" alt="Minions Model" auto-rotate camera-controls style="width: 100%; height: 600px;"></model-viewer>
            <button onclick="hideAll()" class="close-btn">COLLAPSE VIEW</button>
        </div>
    </div>
  </main>

  <script>
    // 背景随鼠标移动脚本
    const glow = document.querySelector('.bg-glow');
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      glow.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(230, 32, 112, 0.15) 0%, transparent 50%)`;
    });

    function showContent(type) {
        hideAll();
        const target = document.getElementById('content-' + type);
        if (target) {
            target.style.display = 'block';
            target.scrollIntoView({behavior: 'smooth', block: 'start'});
        }
    }

    function hideAll() {
        document.querySelectorAll('.content-box').forEach(el => el.style.display = 'none');
    }
  </script>
</body>
</html>
