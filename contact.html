<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Xiaowen Ma</title>
  <link rel="stylesheet" href="MaMXW.css">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0a0a0a;
      font-family: 'Urbanist', sans-serif;
      overflow: hidden;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(230, 32, 112, 0.15) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    .contact-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 60px 40px;
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
      transition: transform 0.4s ease;
    }

    .contact-card:hover {
      transform: translateY(-10px);
      border-color: rgba(230, 32, 112, 0.5);
    }

    .email-link {
      font-size: 1.5rem;
      color: #e62070;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      display: block;
      margin-top: 20px;
      transition: 0.3s;
    }

    .email-link:hover {
      text-shadow: 0 0 15px rgba(230, 32, 112, 0.8);
      color: #fff;
    }

    .contact-title {
      font-size: 2.5rem;
      background: linear-gradient(to right, #fff, #e62070);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <nav>
      <div class="logo" style="font-weight: 700; letter-spacing: 1px;">
        MA <span style="color: #e62070;">XW</span> ART.
      </div>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-container">
    <div class="contact-card">
      <h2 class="contact-title">LET'S CONNECT</h2>
      <p style="color: #888; font-weight: 300; margin-bottom: 30px;">
        Open for collaborations or just a friendly hello.
      </p>

      <div style="font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 3px;">Email Me</div>
      <a href="mailto:Shawnmaarc51@gmail.com" class="email-link">
        Shawnmaarc51@gmail.com
      </a>
    </div>

    <div style="margin-top: 40px;">
      <a href="index.html" style="color: #666; text-decoration: none; font-size: 0.9rem;">&larr; Return to Home</a>
    </div>
  </main>

  <script>
    const glow = document.querySelector('.bg-glow');
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      glow.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(230, 32, 112, 0.15) 0%, transparent 50%)`;
    });
  </script>
</body>
</html>
